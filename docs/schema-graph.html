        }

        #sidebar {

        }

        #sidebar .stat {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        #sidebar .stat-label {
            font-size: 12px;
            color: #95a5a6;
            text-transform: uppercase;
        }

        #sidebar .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
        }

        .controls {
            margin: 20px 0;
        }

        .controls button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .controls button:hover {
            background: #2980b9;
        }

        .legend {
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid white;
        }

        .tooltip {
            position: absolute;
            padding: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            border-radius: 5px;
            pointer-events: none;
            font-size: 12px;
            max-width: 300px;
            z-index: 1000;
            display: none;
        }

        .tooltip h3 {
            margin: 0 0 5px 0;
            color: #3498db;
        }

        .tooltip .endpoint {
            background: rgba(52, 152, 219, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            margin: 2px 0;
            font-size: 11px;
        }

        .node {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
        }

        .node:hover {
            stroke: #f39c12;
            stroke-width: 3px;
        }

        .link {
            stroke: #95a5a6;
            stroke-opacity: 0.3;
            stroke-width: 1.5px;
        }

        .node-label {
            font-size: 10px;
            pointer-events: none;
            text-anchor: middle;
            fill: #2c3e50;
            font-weight: 500;
        }

        #search {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .highlighted {
            stroke: #f39c12;
            stroke-width: 4px;
        }
    </style>
</head>

    "total_relationships": 194
  }
};

        // Set up dimensions
        const width = window.innerWidth - 300;
        const height = window.innerHeight;

        // Create SVG
        const svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // Create a group for zoom/pan
        const g = svg.append("g");

        // Set up zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Update stats
        d3.select("#total-schemas").text(graphData.stats.total_schemas);
        d3.select("#total-objects").text(graphData.stats.total_objects);
        d3.select("#total-types").text(graphData.stats.total_types);
        d3.select("#total-relationships").text(graphData.stats.total_relationships);

        // Create force simulation
        const simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links)
                .id(d => d.id)
                .distance(100))
            .force("charge", d3.forceManyBody()
                .strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(30));

        // Create links
        const link = g.append("g")
            .selectAll("line")
            .data(graphData.links)
            .join("line")
            .attr("class", "link");

        // Create nodes
        const node = g.append("g")
            .selectAll("circle")
            .data(graphData.nodes)
            .join("circle")
            .attr("class", "node")
            .attr("r", d => {
                // Size based on reference count
                const baseSize = 8;
                const scale = Math.min(d.referenced_by_count * 2, 20);
                return baseSize + scale;
            })
            .attr("fill", d => {
                // Color based on type and popularity
                if (d.referenced_by_count > 10) return "#e74c3c"; // Highly referenced
                if (d.type === "object") return "#3498db"; // API objects
                return "#9b59b6"; // Types
            })
            .call(d3.drag()
                .on("start", dragStarted)
                .on("drag", dragged)
                .on("end", dragEnded))
            .on("click", (event, d) => {
                window.open(d.url, "_blank");
            })
            .on("mouseover", showTooltip)
            .on("mouseout", hideTooltip);

        // Create labels
        const labels = g.append("g")
            .selectAll("text")
            .data(graphData.nodes)
            .join("text")
            .attr("class", "node-label")
            .text(d => {
                // Truncate long names
                const name = d.name;
                return name.length > 20 ? name.substring(0, 17) + "..." : name;
            })
            .attr("dy", -15);

        let labelsVisible = true;

        // Update positions on simulation tick
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);

            labels
                .attr("x", d => d.x)
                .attr("y", d => d.y);
        });

        // Drag functions
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // Tooltip functions
        function showTooltip(event, d) {
            const tooltip = d3.select("#tooltip");

            let html = `<h3>${d.name}</h3>`;
            html += `<div><strong>Type:</strong> ${d.type}</div>`;
            html += `<div><strong>References:</strong> ${d.references_count}</div>`;
            html += `<div><strong>Referenced by:</strong> ${d.referenced_by_count}</div>`;

            if (d.description) {
                html += `<div style="margin-top: 5px; color: #95a5a6;">${d.description}</div>`;
            }

            if (d.endpoints) {
                html += `<div style="margin-top: 5px;"><strong>Endpoints:</strong></div>`;
                d.endpoints.forEach(ep => {
                    html += `<div class="endpoint">${ep.method} ${ep.path}</div>`;
                });
            }

            tooltip
                .html(html)
                .style("display", "block")
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 10) + "px");
        }

        function hideTooltip() {
            d3.select("#tooltip").style("display", "none");
        }

        // Control functions
        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
        }

        function centerGraph() {
            const bounds = g.node().getBBox();
            const fullWidth = bounds.width;
            const fullHeight = bounds.height;
            const midX = bounds.x + fullWidth / 2;
            const midY = bounds.y + fullHeight / 2;

            const scale = 0.8 / Math.max(fullWidth / width, fullHeight / height);
            const translate = [width / 2 - scale * midX, height / 2 - scale * midY];

            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
            );
        }

        function toggleLabels() {
            labelsVisible = !labelsVisible;
            labels.style("display", labelsVisible ? "block" : "none");
        }

        // Search functionality
        d3.select("#search").on("input", function() {
            const searchTerm = this.value.toLowerCase();

            node.classed("highlighted", d => {
                const matches = d.name.toLowerCase().includes(searchTerm) ||
                               d.id.toLowerCase().includes(searchTerm);
                return matches && searchTerm.length > 0;
            });

            labels.style("font-weight", d => {
                const matches = d.name.toLowerCase().includes(searchTerm) ||
                               d.id.toLowerCase().includes(searchTerm);
                return (matches && searchTerm.length > 0) ? "bold" : "normal";
            });
        });

        // Initial center
        setTimeout(centerGraph, 100);
    </script>
</body>
</html>
